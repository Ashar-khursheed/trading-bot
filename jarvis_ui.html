<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>J.A.R.V.I.S — Smart Neural Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        .container { max-width: 1200px; margin: 0 auto; height: 100vh; display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 20px; }
        
        /* Stats Panel */
        .panel { background: #0f172a; border-radius: 15px; border: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .panel-h { font-family: 'Orbitron'; font-size: 0.7rem; color: #38bdf8; letter-spacing: 2px; }
        .stat-box { background: #1e293b; padding: 12px; border-radius: 10px; }
        .val { font-size: 1.2rem; font-weight: 700; color: #fff; }
        .lbl { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; }

        /* Main Chat */
        .chat-main { background: #0f172a; border-radius: 15px; border: 1px solid #1e293b; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { padding: 15px 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .top-bar h2 { font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 4px; color: #38bdf8; }
        
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-thumb { background: #38bdf8; }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; align-self: flex-start; background: #1a253a; border: 1px solid #2d3e58; }
        .msg.user { align-self: flex-end; background: #334155; border-color: #475569; }
        .msg small { display: block; font-size: 0.6rem; color: #38bdf8; margin-bottom: 4px; text-transform: uppercase; font-weight: 800; }

        /* Input */
        .input-area { padding: 20px; border-top: 1px solid #1e293b; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #020617; border: 1px solid #1e293b; padding: 12px 18px; border-radius: 12px; color: #fff; outline: none; }
        input:focus { border-color: #38bdf8; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-p { background: #38bdf8; color: #000; }
        .btn-p:hover { background: #fff; }
        
        .mic { width: 48px; height: 48px; border-radius: 50%; border: 1px solid #38bdf8; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mic.active { background: #ef4444; border-color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);} 50%{box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);} }
        
        /* Animated Orb */
        .visualizer { height: 100px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .bar { width: 4px; height: 10px; background: #38bdf8; border-radius: 2px; transition: height 0.1s; }

    </style>
</head>
<body>
    <div class="container">
        <aside class="panel">
            <div class="panel-h">SYSTEM HUB</div>
            <div class="stat-box"><div class="val" id="pnlText">$0.00</div><div class="lbl">Total Profit</div></div>
            <div class="stat-box"><div class="val" id="tradeText">0</div><div class="lbl">Open Trades</div></div>
            <div class="stat-box"><div class="val" id="winRateText">0%</div><div class="lbl">Success Rate</div></div>
            <div class="stat-box"><div class="val" id="statusText">WAITING</div><div class="lbl">Status</div></div>
            
            <div class="panel-h" style="margin-top:auto">Visual Core</div>
            <div class="visualizer" id="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </aside>

        <main class="chat-main">
            <div class="top-bar"><h2>J.A.R.V.I.S — V2.0</h2><small id="connection" style="color:#10b981">● CONNECTED</small></div>
            <div class="messages" id="msgs">
                <div class="msg"><small>Jarvis</small>Assalam o Alakikum sir. System is online. Market monitoring is active. How can I assist you today?</div>
            </div>
            <div class="input-area">
                <div class="mic" id="mic" onclick="toggleMic()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
                </div>
                <input type="text" id="userInput" placeholder="Ask anything... (BTC check karein?)" onkeydown="if(event.key==='Enter')send()">
                <button class="btn btn-p" onclick="send()">SEND</button>
            </div>
        </main>
    </div>

    <script>
        const msgs = document.getElementById('msgs');
        const input = document.getElementById('userInput');
        const mic = document.getElementById('mic');
        const visualizer = document.getElementById('visualizer');
        const bars = document.querySelectorAll('.bar');

        let isListening = false;
        let synthesis = window.speechSynthesis;
        let voice = null;

        // ── Load Best Available Voice (Pakistani/Natural) ─────
        function loadVoice() {
            const voices = synthesis.getVoices();
            // Look for Google UK/US or English voices which sound the most natural locally
            voice = voices.find(v => v.name.includes("Google English") || v.name.includes("Google UK") || v.name.includes("Male")) || voices[0];
        }
        synthesis.onvoiceschanged = loadVoice;
        loadVoice();

        // ── Speech Entry (Instant) ──────────────────────────
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SR) {
            const recognition = new SR();
            recognition.continuous = false;
            recognition.onstart = () => { isListening = true; mic.classList.add('active'); };
            recognition.onresult = (e) => { input.value = e.results[0][0].transcript; send(); };
            recognition.onend = () => { isListening = false; mic.classList.remove('active'); };
            
            window.toggleMic = () => { 
                if(synthesis.speaking) synthesis.cancel();
                isListening ? recognition.stop() : recognition.start(); 
            };
        }

        async function send() {
            const val = input.value.trim(); if(!val) return;
            addMsg(val, 'user');
            input.value = '';
            document.getElementById('statusText').textContent = 'THINKING';
            animateVisualizer(true);

            try {
                const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message: val}) });
                const data = await res.json();
                addMsg(data.reply, 'jarvis');
                speak(data.reply);
                document.getElementById('statusText').textContent = 'READY';
                if(data.context) updateStats(data.context);
            } catch(e) { 
                addMsg("Connection error sir.", 'jarvis'); 
                animateVisualizer(false);
            }
        }

        function addMsg(text, role) {
            const d = document.createElement('div');
            d.className = `msg ${role==='user'?'user':''}`;
            d.innerHTML = `<small>${role==='user'?'You':'Jarvis'}</small>${text}`;
            msgs.appendChild(d);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function speak(text) {
            if(synthesis.speaking) synthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.voice = voice; u.rate = 1.0; u.pitch = 0.9;
            u.onstart = () => animateVisualizer(true);
            u.onend = () => animateVisualizer(false);
            synthesis.speak(u);
        }

        function animateVisualizer(active) {
            bars.forEach((bar, i) => {
                if(active) {
                    bar.style.height = `${10 + Math.random() * 50}px`;
                    bar.style.transition = 'height 0.15s';
                } else {
                    bar.style.height = '6px';
                }
            });
            if(active) setTimeout(() => animateVisualizer(true), 150);
        }

        function updateStats(c) {
            document.getElementById('pnlText').textContent = `$${c.total_pnl.toFixed(2)}`;
            document.getElementById('tradeText').textContent = c.open_trades;
            document.getElementById('winRateText').textContent = `${c.win_rate}%`;
        }

        async function poll() { try { const r = await fetch('/api/status'); const d = await r.json(); updateStats(d); } catch(e){} }
        setInterval(poll, 10000);
        poll();
    </script>
</body>
</html>
